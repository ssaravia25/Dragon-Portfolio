name: Daily Portfolio Update

on:
  schedule:
    - cron: '0 19 * * 1-5'    # 15:00 ET (EDT, Mar-Nov)
    - cron: '0 20 * * 1-5'    # 15:00 ET (EST, Nov-Mar)
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if not 3pm NY (avoid double run from dual cron)
        id: timecheck
        run: |
          NY_HOUR=$(TZ=America/New_York date +%H)
          echo "NY hour: $NY_HOUR"
          if [ "$NY_HOUR" != "15" ] && [ "$GITHUB_EVENT_NAME" == "schedule" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.timecheck.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.timecheck.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.timecheck.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Delete price cache (force fresh data)
        if: steps.timecheck.outputs.skip != 'true'
        run: rm -f price_cache.json

      - name: Run dragon_backtest.py
        if: steps.timecheck.outputs.skip != 'true'
        run: python dragon_backtest.py

      - name: Run dragon_sma200.py
        if: steps.timecheck.outputs.skip != 'true'
        run: python dragon_sma200.py

      - name: Run dragon_alternatives.py
        if: steps.timecheck.outputs.skip != 'true'
        run: python dragon_alternatives.py

      - name: Run dragon_live.py (live dashboard + email)
        if: steps.timecheck.outputs.skip != 'true'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python dragon_live.py

      - name: Commit updated reports
        if: steps.timecheck.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dragon_Portfolio_Backtest.html Dragon_SMA200_Backtest.html Dragon_Alternativas.html DragonDobleSMA_Live.html last_rebal.json index.html
          git diff --staged --quiet || git commit -m "Daily update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  deploy-pages:
    needs: update-reports
    if: always() && needs.update-reports.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
