name: Daily Portfolio Update

on:
  schedule:
    # Runs at 22:00 UTC every weekday (Mon-Fri) — after US market close
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Delete price cache (force fresh data)
        run: rm -f price_cache.json

      - name: Run dragon_backtest.py
        run: python dragon_backtest.py

      - name: Run dragon_sma200.py
        run: python dragon_sma200.py

      - name: Run dragon_alternatives.py
        run: python dragon_alternatives.py

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dragon_Portfolio_Backtest.html Dragon_SMA200_Backtest.html Dragon_Alternativas.html
          git diff --staged --quiet || git commit -m "Daily update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  deploy-pages:
    needs: update-reports
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
