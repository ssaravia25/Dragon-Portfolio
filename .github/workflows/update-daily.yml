name: Daily Portfolio Update

on:
  schedule:
    - cron: '0 22 * * 1-5'    # After US close: full run (reports + daily email)
    - cron: '30 20 * * 1-5'   # Pre-close (~3:30pm ET summer): SMA50 alert only
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Pre-close alert: lightweight SMA50 signal check (~30min before close)
  pre-close-alert:
    if: github.event.schedule == '30 20 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SMA50 alert check
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_MODE: "1"
        run: python dragon_live.py

  # Full daily update: all reports + daily email + deploy
  update-reports:
    if: github.event.schedule != '30 20 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Delete price cache (force fresh data)
        run: rm -f price_cache.json

      - name: Run dragon_backtest.py
        run: python dragon_backtest.py

      - name: Run dragon_sma200.py
        run: python dragon_sma200.py

      - name: Run dragon_alternatives.py
        run: python dragon_alternatives.py

      - name: Run dragon_live.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python dragon_live.py

      - name: Commit updated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dragon_Portfolio_Backtest.html Dragon_SMA200_Backtest.html Dragon_Alternativas.html Dragon_Live.html last_rebal.json index.html
          git diff --staged --quiet || git commit -m "Daily update: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  deploy-pages:
    needs: update-reports
    if: always() && needs.update-reports.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
